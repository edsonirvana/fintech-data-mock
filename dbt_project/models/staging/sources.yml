-- models/staging/sources.yml
-- FONTE DE VERDADE: aponta para tabelas brutas no dataset raw

version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID', 'paybridge-data-challenge') }}"
    schema: raw
    description: "Dados brutos ingeridos do PostgreSQL legado e CSVs do ERP"
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: _loaded_at

    tables:
      - name: transactions
        description: "Transações financeiras processadas pela PayBridge"
        columns:
          - name: transaction_id
            tests: [not_null, unique]
          - name: amount_brl
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: "> 0"
          - name: status
            tests:
              - accepted_values:
                  values: ['approved', 'denied', 'cancelled', 'chargeback', 'pending']
          - name: payment_method
            tests:
              - accepted_values:
                  values: ['credit_card', 'debit_card', 'pix', 'boleto', 'ted']

      - name: customers
        description: "Cadastro de clientes PJ da PayBridge"
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: customer_segment
            tests:
              - accepted_values:
                  values: ['startup', 'sme', 'enterprise', 'micro']

      - name: merchants
        description: "Estabelecimentos credenciados"
        columns:
          - name: merchant_id
            tests: [not_null, unique]

      - name: credit_contracts
        description: "Contratos de crédito e parcelas"
        columns:
          - name: contract_id
            tests: [not_null, unique]
          - name: risk_classification_bacen
            tests:
              - accepted_values:
                  values: ['AA', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H']

      - name: daily_rates
        description: "Taxas financeiras diárias (CDI, Selic, câmbio)"
        columns:
          - name: rate_date
            tests: [not_null, unique]
